# /etc/asound.conf
# Route default ALSA output to the Pi's HDMI audio. vc4hdmi0 is the card for
# connector HDMI-A-1 (the one the panel is on). Console mode has no PipeWire, so
# gstreamer / audioplayers talk straight to ALSA. If your panel is on the other
# HDMI port, use vc4hdmi1 instead (check: aplay -l and
# /sys/class/drm/card*-HDMI-A-*/status).
pcm.!default { type plug slave.pcm { type hw card vc4hdmi0 } }
ctl.!default { type hw card vc4hdmi0 }
